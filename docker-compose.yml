# DocuFlow — full local stack.
#   docker compose up --build
#
# Service URLs (from the host):
#   Frontend    http://localhost:5173
#   API + docs  http://localhost:8000  (/docs)
#   MinIO API   http://localhost:9000
#   MinIO UI    http://localhost:9001  (minioadmin / minioadmin)

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: docuflow
      POSTGRES_USER: docuflow
      POSTGRES_PASSWORD: secret
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U docuflow -d docuflow"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    env_file:
      - ./backend/.env
    # Override host-based URLs from .env with in-network service names.
    environment:
      DATABASE_URL: postgresql+asyncpg://docuflow:secret@postgres:5432/docuflow
      REDIS_URL: redis://redis:6379/0
      MINIO_ENDPOINT: minio:9000
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app

  celery_worker:
    build: ./backend
    command: celery -A app.workers.celery_app:celery_app worker --loglevel=info --concurrency=4
    env_file:
      - ./backend/.env
    environment:
      DATABASE_URL: postgresql+asyncpg://docuflow:secret@postgres:5432/docuflow
      REDIS_URL: redis://redis:6379/0
      MINIO_ENDPOINT: minio:9000
    depends_on:
      - backend
      - redis
      - postgres
    volumes:
      - ./backend:/app

  celery_beat:
    build: ./backend
    command: celery -A app.workers.celery_app:celery_app beat --loglevel=info
    env_file:
      - ./backend/.env
    environment:
      DATABASE_URL: postgresql+asyncpg://docuflow:secret@postgres:5432/docuflow
      REDIS_URL: redis://redis:6379/0
      MINIO_ENDPOINT: minio:9000
    depends_on:
      - celery_worker
    volumes:
      - ./backend:/app

  frontend:
    build: ./frontend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      VITE_API_BASE_URL: http://localhost:8000
    depends_on:
      - backend

volumes:
  postgres_data:
  minio_data:
